<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Odyssey - Perjalanan Satu Tantangan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; background: radial-gradient(circle at top, #c8f1ff 0%, #7cc7f7 35%, #1f466a 100%); color: #113d5f; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .overlay, .screen { width: 100%; max-width: 520px; }
        .card { background: rgba(255,255,255,0.95); border-radius: 24px; border: 2px solid rgba(255,255,255,0.65); box-shadow: 0 24px 60px rgba(0,0,0,0.15); padding: 28px; text-align: center; }
        h1 { font-size: clamp(2rem, 4vw, 3rem); letter-spacing: -0.04em; color: #164a7d; margin-bottom: 16px; }
        p { line-height: 1.7; color: #345a7c; margin-bottom: 22px; }
        .button { background: linear-gradient(135deg, #5fb8ff, #4a7eea); color: white; border: none; border-radius: 14px; padding: 14px 22px; font-size: 1rem; cursor: pointer; font-weight: 700; transition: transform 0.18s ease, box-shadow 0.18s ease; }
        .button:hover { transform: translateY(-2px); box-shadow: 0 14px 22px rgba(30, 100, 180, 0.24); }
        .button:active { transform: translateY(1px); }
        .hidden { display: none !important; }
        .scene { background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(219,242,255,0.95) 100%); border: 2px solid rgba(255,255,255,0.8); border-radius: 28px; padding: 28px; position: relative; overflow: hidden; }
        .road { position: relative; height: 180px; border-radius: 32px; background: linear-gradient(90deg, rgba(255,255,255,0.9), rgba(255,255,255,0.65)); margin-bottom: 18px; box-shadow: inset 0 0 0 1px rgba(17,61,95,0.08); }
        .road::before { content: ''; position: absolute; top: 50%; left: 12%; right: 12%; height: 14px; transform: translateY(-50%); background: #d8eef8; border-radius: 999px; box-shadow: inset 0 0 0 2px rgba(33,90,132,0.08); }
        .goal { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .goal-icon { width: 74px; height: 74px; background: #ffe9ce; display: grid; place-items: center; border-radius: 22px; box-shadow: 0 12px 24px rgba(0,0,0,0.12); font-size: 2rem; }
        .goal-label { font-size: 0.95rem; font-weight: 700; color: #1d4f73; }
        .player { position: absolute; left: 18px; top: calc(50% - 34px); width: 68px; height: 68px; border-radius: 22px; background: linear-gradient(145deg, #ffaec8, #ff7da3); display: grid; place-items: center; box-shadow: 0 16px 28px rgba(255,118,149,0.32); transition: left 3.5s ease-in-out; font-size: 2rem; }
        .player.moving { left: calc(100% - 106px); }
        .info { color: #1b4569; font-weight: 600; font-size: 0.98rem; margin-top: 10px; }
        .choices { display: grid; gap: 14px; margin-top: 10px; }
        .choice { background: #f4fbff; border: 2px solid rgba(95, 184, 255, 0.4); border-radius: 16px; padding: 14px 16px; text-align: left; cursor: pointer; font-weight: 700; color: #1d4f73; transition: transform 0.15s ease, border-color 0.15s ease; }
        .choice:hover { transform: translateY(-1px); border-color: #5fb8ff; }
        .choice.disabled { opacity: 0.65; cursor: default; }
        .result-title { font-size: clamp(2rem, 4vw, 2.4rem); margin-bottom: 12px; }
        .result-text { line-height: 1.75; margin-bottom: 20px; }
        .score-box { margin-top: 10px; font-weight: 700; color: #1f4a6f; }
        @media (max-width: 520px) {
            body { padding: 14px; }
            .scene { padding: 18px; }
            .road { height: 150px; }
            .player { width: 60px; height: 60px; top: calc(50% - 30px); }
            .goal-icon { width: 62px; height: 62px; font-size: 1.7rem; }
        }
    </style>
</head>
<body>
    <div class="overlay" id="start-screen">
        <div class="card">
            <h1>Resonance Odyssey</h1>
            <p>Permainan sederhana: satu perjalanan lurus, mencapai tujuan, dan jawab satu tantangan. Setelah itu selesai.</p>
            <button class="button" id="start-game">Mulai Perjalanan</button>
        </div>
    </div>

    <div class="screen hidden" id="game-screen">
        <div class="card scene">
            <div class="road"></div>
            <div class="player" id="player">👦</div>
            <div class="goal">
                <div class="goal-icon">🏠</div>
                <div class="goal-label">Tujuan</div>
            </div>
            <p class="info">Karakter bergerak otomatis sekali menuju tujuan. Tidak ada kontrol arah lain.</p>
        </div>
    </div>

    <div class="overlay hidden" id="quiz-screen">
        <div class="card">
            <h1>SOAL EDUKASI</h1>
            <p>Pilih jawaban yang paling tepat!</p>
            <div class="choices" id="options"></div>
        </div>
    </div>

    <div class="overlay hidden" id="result-screen">
        <div class="card">
            <div class="result-title" id="result-title"></div>
            <p class="result-text" id="result-text"></p>
            <div class="score-box" id="result-score"></div>
            <button class="button" id="restart-button">Main Lagi</button>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const player = document.getElementById('player');
        const optionsContainer = document.getElementById('options');
        const resultTitle = document.getElementById('result-title');
        const resultText = document.getElementById('result-text');
        const resultScore = document.getElementById('result-score');
        const restartButton = document.getElementById('restart-button');

        const question = {
            text: 'Alat musik tradisional Jawa Barat yang dimainkan dengan cara digoyangkan dan menghasilkan nada berharmoni disebut?',
            answers: ['Angklung', 'Suling', 'Gamelan', 'Kecapi'],
            correctIndex: 0
        };

        function show(element) { element.classList.remove('hidden'); }
        function hide(element) { element.classList.add('hidden'); }

        function startJourney() {
            hide(startScreen);
            show(gameScreen);
            setTimeout(() => {
                player.classList.add('moving');
            }, 100);

            player.addEventListener('transitionend', onReachedTarget, { once: true });
        }

        function onReachedTarget() {
            setTimeout(() => {
                showQuiz();
            }, 500);
        }

        function showQuiz() {
            hide(gameScreen);
            show(quizScreen);
            optionsContainer.innerHTML = '';
            question.answers.forEach((answer, index) => {
                const button = document.createElement('button');
                button.className = 'choice';
                button.textContent = answer;
                button.addEventListener('click', () => selectAnswer(index, button));
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(index, button) {
            const correct = index === question.correctIndex;
            Array.from(optionsContainer.children).forEach(child => {
                child.classList.add('disabled');
                child.disabled = true;
            });
            button.classList.remove('disabled');
            button.style.borderColor = correct ? '#16a34a' : '#dc2626';
            showResult(correct);
        }

        function showResult(correct) {
            hide(quizScreen);
            show(resultScreen);
            if (correct) {
                resultTitle.textContent = 'Selamat, Kamu Benar!';
                resultText.textContent = 'Karakter mencapai tujuan, dan kamu berhasil menjawab tantangan edukasi dengan tepat.';
                resultScore.textContent = 'Skor: 100';
            } else {
                resultTitle.textContent = 'Sayang sekali, Salah.';
                resultText.textContent = 'Karakter sampai tujuan tetapi jawaban kamu belum tepat. Pelajari lagi dan coba lagi!';
                resultScore.textContent = 'Skor: 0';
            }
        }

        function restartGame() {
            hide(resultScreen);
            player.classList.remove('moving');
            show(startScreen);
        }

        document.getElementById('start-game').addEventListener('click', startJourney);
        restartButton.addEventListener('click', restartGame);
    </script>
</body>
</html>
